name = "bt-servant-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "development"
MAX_ORCHESTRATION_ITERATIONS = "10"
CODE_EXEC_TIMEOUT_MS = "30000"
MAX_MCP_CALLS_PER_EXECUTION = "10"
DEFAULT_ORG = "unfoldingWord"

# KV Namespaces
[[kv_namespaces]]
binding = "ORG_ADMIN_KEYS"
id = "8b9f2b37a9c04a3392757933fd2d646b"

[[kv_namespaces]]
binding = "MCP_SERVERS"
id = "a101cdbc8fc347e8b88b9dadc328dbe0"

[[kv_namespaces]]
binding = "ORG_CONFIG"
id = "d7149c3d69f34cff87146557163f0a6c"

[[kv_namespaces]]
binding = "PROMPT_OVERRIDES"
id = "c1828624ab434f079776bddd171882d9"

# Workers AI
[ai]
binding = "AI"

# Durable Objects
[[durable_objects.bindings]]
name = "USER_SESSION"
class_name = "UserSession"

[[durable_objects.bindings]]
name = "USER_QUEUE"
class_name = "UserQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserSession"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserQueue"]

# ──── Staging environment ────
[env.staging]
name = "bt-servant-worker-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
MAX_ORCHESTRATION_ITERATIONS = "10"
CODE_EXEC_TIMEOUT_MS = "30000"
MAX_MCP_CALLS_PER_EXECUTION = "10"
DEFAULT_ORG = "unfoldingWord"

[[env.staging.kv_namespaces]]
binding = "ORG_ADMIN_KEYS"
id = "3c8189cb077a463fb95b00f6fcf178c0"

[[env.staging.kv_namespaces]]
binding = "MCP_SERVERS"
id = "76b75c5465f0447995db8ec123056f22"

[[env.staging.kv_namespaces]]
binding = "ORG_CONFIG"
id = "f0783f5b724b427d94245ecbf810a267"

[[env.staging.kv_namespaces]]
binding = "PROMPT_OVERRIDES"
id = "1416f321fbda450095214111d38d211a"

[env.staging.ai]
binding = "AI"

[[env.staging.durable_objects.bindings]]
name = "USER_SESSION"
class_name = "UserSession"

[[env.staging.durable_objects.bindings]]
name = "USER_QUEUE"
class_name = "UserQueue"
