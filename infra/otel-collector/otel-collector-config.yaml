# OpenTelemetry Collector — bt-servant-worker telemetry pipe (fly.io)
#
# One bearer-authed OTLP/HTTP receiver exports every signal to OpenObserve
# (self-hosted on fly); metrics ALSO fan out to InfluxDB 3 (door43). Kept as a
# collector (not worker→sink direct) so sinks are added/changed HERE ONLY — the
# worker never redeploys.
#
# All ${env:...} values come from fly secrets (see README). Nothing secret in git.

extensions:
  # Validates the shared secret the worker sends as `Authorization: Bearer <token>`.
  # fly terminates TLS in front of us, so this bearer check is what actually gates ingest.
  bearertokenauth/server:
    scheme: Bearer
    token: ${env:OTEL_INGEST_TOKEN}

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth/server

processors:
  # Keep a small fly machine from OOMing on a burst. MUST be first.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Defense-in-depth redaction: the worker already redacts at source, but if a new
  # call site ever leaks a sensitive attribute, drop/hash it here before egress too.
  attributes/redact:
    actions:
      - { key: authorization, action: delete }
      - { key: token, action: delete }
      - { key: api_key, action: delete }
      - { key: apikey, action: delete }
      - { key: password, action: delete }
      - { key: secret, action: delete }
      - { key: cookie, action: delete }
      - { key: user_id, action: hash } # pseudonymize identifiers, keep them joinable

  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  # ── Sink #1: OpenObserve (self-hosted) ── routes by `stream-name` header per signal.
  # endpoint is the org base; otlp_http appends /v1/{traces,logs,metrics}.
  otlp_http/openobserve_traces:
    endpoint: ${env:O2_ENDPOINT} # e.g. https://bt-servant-openobserve.fly.dev/api/default
    headers:
      Authorization: ${env:O2_AUTH} # O2_AUTH = "Basic <base64(user:token)>"
      stream-name: traces
  otlp_http/openobserve_logs:
    endpoint: ${env:O2_ENDPOINT}
    headers:
      Authorization: ${env:O2_AUTH}
      stream-name: logs
  otlp_http/openobserve_metrics:
    endpoint: ${env:O2_ENDPOINT}
    headers:
      Authorization: ${env:O2_AUTH} # metrics auto-stream, no stream-name

  # ── Sink #2 (metrics only): InfluxDB 3 Core via door43's Nginx write proxy ──
  # Influx 3 has NO native OTLP receiver, so this exporter converts OTLP metrics to
  # line protocol and POSTs them to the v2-compat write API
  # (`/api/v2/write?org=...&bucket=...`). The Nginx in front VALIDATES the
  # `bucket=` in the request against the token, so `bucket` must be the exact name
  # the token is mapped to; the bucket auto-creates on first write (retention is
  # then set by infra, after creation). Auth is door43's CUSTOM header — the
  # exporter's own `token` field would send `Authorization: Token ...`, which the
  # proxy does not read, so it stays unset and the header is passed explicitly.
  influxdb/door43_metrics:
    endpoint: https://metrics.door43.org
    org: unfoldingword # required by the exporter; Influx 3 ignores it (bucket is what's validated)
    bucket: bt-servant-staging
    headers:
      X-InfluxDB-API-Token: ${env:INFLUX_TOKEN}

  # Bring-up aid: verbose stdout so `fly logs` shows every record. Remove once the
  # sink is confirmed (detailed verbosity is expensive under real traffic).
  debug:
    verbosity: detailed

service:
  extensions: [bearertokenauth/server]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [otlp_http/openobserve_traces, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [otlp_http/openobserve_logs, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [otlp_http/openobserve_metrics, influxdb/door43_metrics, debug]
  telemetry:
    logs:
      level: info
