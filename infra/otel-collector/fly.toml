# fly.io app for the OpenTelemetry Collector.
# Adjust `app` and `primary_region` to your fly org before `fly launch`/`fly deploy`.
app = "bt-servant-otel-collector"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Pin the collector version at build time:
  #   fly deploy --build-arg OTELCOL_VERSION=<stable-tag>

[http_service]
  internal_port = 4318          # OTLP/HTTP; fly terminates TLS on 443 in front of this
  force_https = true
  # A telemetry pipe must be available whenever the worker emits — do not scale to zero.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
